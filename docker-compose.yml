services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./app/certs:/app/certs
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kumon
      POSTGRES_PASSWORD: kumon123
      POSTGRES_DB: kumon_management
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  evolution:
    image: atendai/evolution-api:latest
    ports:
      - "8081:8080"
    environment:
      SERVER_URL: http://localhost:8081
      AUTHENTICATION_API_KEY: kumon-evolution-key
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://kumon:kumon123@db:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      QRCODE_LIMIT: "30"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_SAVE_INSTANCES: "true"
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
  evolution_data:
  redis_data:
